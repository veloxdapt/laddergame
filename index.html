<body>

<div id="s-setup" class="scr on">
  <div class="made-by">Made by JY</div>
  <div class="big-title"><svg width="42" height="48" viewBox="0 0 42 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:5px;margin-bottom:3px;filter:drop-shadow(0 0 6px #60a5fa)"><line x1="6" y1="2" x2="6" y2="46" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/><line x1="21" y1="2" x2="21" y2="46" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/><line x1="36" y1="2" x2="36" y2="46" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/><line x1="6" y1="13" x2="21" y2="13" stroke="rgba(255,255,255,0.92)" stroke-width="3" stroke-linecap="round"/><line x1="21" y1="25" x2="36" y2="25" stroke="rgba(255,255,255,0.92)" stroke-width="3" stroke-linecap="round"/><line x1="6" y1="37" x2="21" y2="37" stroke="rgba(255,255,255,0.92)" stroke-width="3" stroke-linecap="round"/></svg>사다리 타기</div>

        oninput="onNameInput()" onfocus="showPh('name-ph',false)" onblur="showPh('name-ph',!this.value.trim())"></textarea>
      <div class="ph-label" id="name-ph">민서, 유준, 도혁, 하리 …&#10;반복 입력: 도혁*2, 하리*3 …</div>
    </div>
  </div>

    <button class="mtab" onclick="selMode('B')"><span class="mico">👔</span>역할<br>분담하기</button>
    <button class="mtab" onclick="selMode('C')"><span class="mico">🥇</span>순위<br>고르기</button>

<script>
'use strict';
const EMOJIS=['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🦄','🐙','🦋','🐬','🐝'];
const COLORS=['#FF6B6B','#4ECDC4','#45B7D1','#96e86b','#FFEAA7','#dd6bff','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9','#F1948A','#82E0AA','#F8C471','#AED6F1','#A9DFBF','#FFB347','#D2B4DE','#A3E4D7','#FAD7A0','#D5E8D4'];
const PCOLORS=['#ffd93d','#ff6b6b','#6bcb77','#4d96ff','#c084fc','#fb923c','#34d399','#f472b6','#60a5fa','#a78bfa','#fbbf24','#4ade80','#818cf8','#f87171','#2dd4bf','#e879f9','#38bdf8','#fb7185','#a3e635','#fdba74'];
const NR=16;

let pCnt=4,wCnt=1,MODE='A',roleValues=[];
let G=null,RAF=null,_stars=null;

function cc(d){pCnt=clamp(pCnt+d,2,20);wCnt=Math.min(wCnt,pCnt-1);renderNames();renderMS()}
function cw(d){wCnt=clamp(wCnt+d,1,pCnt-1);renderMS()}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function saveBR(){
  const ri=document.getElementById('role-input');
  if(ri) roleValues=ri.value;
}

function selMode(m){
  MODE=m;
  document.querySelectorAll('.mtab').forEach((t,i)=>t.classList.toggle('sel',['A','B','C'][i]===m));
  renderMS();
}

// Parse "이름,이름2,이름*3" → array of names (max n)
function parseNames(raw, n){
  if(!raw.trim()) return [];
  return raw.split(',').flatMap(seg=>{
    seg=seg.trim();
    const m=seg.match(/^(.+?)\s*\*\s*(\d+)$/);
    if(m){const nm=m[1].trim()||'';const rep=Math.min(parseInt(m[2]),20);return Array(rep).fill(nm)}
    return seg?[seg]:[];
  }).slice(0,n);
}

function renderNames(){
  document.getElementById('cd').textContent=pCnt;
  const raw=(document.getElementById('name-input')||{value:''}).value||'';
  const parsed=parseNames(raw,pCnt);
  const g=document.getElementById('ng');
  g.innerHTML='';
  for(let i=0;i<pCnt;i++){
    const nm=parsed[i]||'';
    const d=document.createElement('div');
    d.className='epill'+(nm?' filled':'');
    d.innerHTML=`<span class="pem">${EMOJIS[i]}</span><span class="pnm">${nm||`P${i+1}`}</span>`;
    g.appendChild(d);
  }
}

function onNameInput(){
  renderNames();
  const ta=document.getElementById('name-input');
  showPh('name-ph',!ta.value.trim());
}

function showPh(id,show){
  const el=document.getElementById(id);
  if(el)el.style.opacity=show?'1':'0';
}

function renderMS(){
  const el=document.getElementById('ms-card');
  if(MODE==='A'){
    el.innerHTML=`<div class="ctitle">🏆 당첨 수 설정</div><div class="row"><button class="nbtn" onclick="cw(-1)">−</button><div class="wdsp">${wCnt}</div><button class="nbtn" onclick="cw(+1)">+</button><div class="rinfo">${pCnt}명 중 <strong style="color:#fbbf24">${wCnt}명</strong> 당첨</div></div>`;
  } else if(MODE==='B'){
    const curVal=typeof roleValues==='string'?roleValues:(roleValues||[]).join(', ');
    el.innerHTML=`<div class="ctitle">👔 역할 입력 (${pCnt}개)</div>
      <div class="emoji-row" id="rg"></div>
      <div class="big-input-wrap">
        <textarea class="big-input" id="role-input" rows="2"
          oninput="onRoleInput()" onfocus="showPh('role-ph',false)" onblur="showPh('role-ph',!this.value.trim())">${curVal}</textarea>
        <div class="ph-label" id="role-ph" style="opacity:${curVal?0:1}">팀원*3, 자료조사*2, 발표자 …&#10;반복 입력: 역할이름*개수</div>
      </div>`;
    renderRoleEmojis();
  } else {
    const medals=['🥇','🥈','🥉'];
    let p='';for(let i=0;i<Math.min(pCnt,3);i++)p+=medals[i]+` ${i+1}등 `;
    if(pCnt>3)p+=`... 😅 꼴찌`;
    el.innerHTML=`<div class="ctitle">🏅 순위 자동 배정</div><div class="rank-preview">사다리가 <strong style="color:#fbbf24">${pCnt}명</strong>의 순위를 정해드립니다<br>${p.trim()}</div>`;
  }
}

function renderRoleEmojis(){
  const raw=(document.getElementById('role-input')||{value:''}).value||'';
  const roles=parseNames(raw,pCnt);
  const g=document.getElementById('rg');if(!g)return;
  g.innerHTML='';
  for(let i=0;i<pCnt;i++){
    const nm=roles[i]||'';
    const d=document.createElement('div');
    d.className='epill'+(nm?' filled':'');
    d.innerHTML=`<span class="pem">📌</span><span class="pnm">${nm||`역할${i+1}`}</span>`;
    g.appendChild(d);
  }
}
function onRoleInput(){
  renderRoleEmojis();
  const ta=document.getElementById('role-input');
  showPh('role-ph',!ta.value.trim());
}

function calcDim(n){
  const availW=window.innerWidth-24;
  const nc=Math.max(n-1,1);
  const raw=(availW-50)/nc;
  const sc=Math.min(1,raw/70);
  const cw=Math.max(28,Math.round(70*sc));
  const cr=Math.max(10,Math.round(23*sc));
  const rh=Math.max(36,Math.round(65*sc));
  const pt=Math.max(65,Math.round(108*sc));
  const bw=cw-2;                              // box width = col width - 2px gap
  const bh=Math.max(44,Math.round(bw*1.5));  // tall enough for icon+label
  const pb=bh+30;
  return{cw,cr,rh,pt,pb,sc,bw,bh};
}

function genLadder(n){
  // 인원이 많을수록 연결 확률 증가 → 더 잘 섞임
  const prob=Math.min(0.68, 0.38 + n * 0.015);
  const bars=[];
  for(let r=0;r<NR;r++){
    bars[r]=new Array(n-1).fill(false);
    for(let c=0;c<n-1;c++){if(c>0&&bars[r][c-1])continue;if(Math.random()<prob)bars[r][c]=true}
  }
  return bars;
}

function trace(start,bars,n){
  let col=start;const cols=[col];
  for(let r=0;r<NR;r++){
    if(col<n-1&&bars[r][col])col++;
    else if(col>0&&bars[r][col-1])col--;
    cols.push(col);
  }
  return cols;
}

function genSlots(n,mode,md){
  const slots=Array(n).fill(null).map(()=>({}));
  const rnd=arr=>[...arr].sort(()=>Math.random()-.5);
  if(mode==='A'){
    rnd(Array.from({length:n},(_,i)=>i)).forEach((col,i)=>{
      slots[col]=i<md.w?{lbl:'당첨!',ico:'🏆',cls:'top',color:'#fbbf24'}:{lbl:'꽝',ico:'😢',cls:'',color:'#4b5563'};
    });
  } else if(mode==='B'){
    rnd(md.roles).forEach((role,col)=>{slots[col]={lbl:role||`역할${col+1}`,ico:'📌',cls:'role',color:'#60a5fa'}});
  } else {
    const ranks=Array.from({length:n},(_,i)=>{
      if(i===0)return{lbl:'1등',ico:'🥇',cls:'top',color:'#fbbf24'};
      if(i===1)return{lbl:'2등',ico:'🥈',cls:'rank2',color:'#c0c0c0'};
      if(i===2)return{lbl:'3등',ico:'🥉',cls:'rank3',color:'#cd7f32'};
      if(i===n-1)return{lbl:'꼴찌',ico:'😅',cls:'',color:'#6b7280'};
      return{lbl:`${i+1}등`,ico:'🎯',cls:'',color:'#9ca3af'};
    });
    rnd(ranks).forEach((r,col)=>slots[col]=r);
  }
  return slots;
}

function CX(col,n,cW,colW){return(cW-(n-1)*colW)/2+col*colW}
function RY(row,pt,rh){return pt+row*rh}

function buildWP(pathCols,n,cW,dim){
  const{cw,rh,pt}=dim;const pts=[];
  pts.push({x:CX(pathCols[0],n,cW,cw),y:RY(0,pt,rh)});
  for(let r=0;r<NR;r++){
    const x1=CX(pathCols[r],n,cW,cw),x2=CX(pathCols[r+1],n,cW,cw);
    const barY=RY(r,pt,rh)+rh/2,botY=RY(r+1,pt,rh);
    if(x1!==x2){pts.push({x:x1,y:barY});pts.push({x:x2,y:barY})}
    pts.push({x:x2,y:botY});
  }
  pts.push({x:CX(pathCols[NR],n,cW,cw),y:RY(NR,pt,rh)+10});
  return pts;
}

function startGame(){
  const rawNames=(document.getElementById('name-input')||{value:''}).value||'';
  const parsedNms=parseNames(rawNames,pCnt);
  const names=Array.from({length:pCnt},(_,i)=>parsedNms[i]||`참가자${i+1}`);
  const n=pCnt;
  document.getElementById('em').textContent='';
  let md={};
  if(MODE==='A'){if(wCnt<1||wCnt>=n){document.getElementById('em').textContent='당첨 수가 올바르지 않습니다.';return}md={w:wCnt}}
  else if(MODE==='B'){
    const rawRoles=(document.getElementById('role-input')||{value:''}).value||'';
    const pr=parseNames(rawRoles,pCnt);
    md={roles:Array.from({length:pCnt},(_,i)=>pr[i]||`역할${i+1}`)};
  }

  const bars=genLadder(n);
  const paths=Array.from({length:n},(_,i)=>trace(i,bars,n));
  const slots=genSlots(n,MODE,md);
  const dim=calcDim(n);
  const{cw,rh,pt,pb}=dim;
  const cW=Math.max((n-1)*cw+50+20,window.innerWidth);
  const cH=pt+NR*rh+pb;

  const characters=names.map((name,i)=>{
    const fc=paths[i][NR];
    const wps=buildWP(paths[i],n,cW,dim);
    return{name,emoji:EMOJIS[i],color:COLORS[i],startCol:i,finalCol:fc,slot:slots[fc],waypoints:wps,wpIdx:0,x:wps[0].x,y:wps[0].y,done:false,trail:[]};
  });

  G={n,bars,characters,slots,cW,cH,dim,mode:MODE,phase:'waiting',revP:0,particles:[],celebT:0,swapSel:-1,swapCount:0,swapFlash:null,swapMode:document.getElementById('swap-opt').checked,pitColors:Array.from({length:n},(_,i)=>PCOLORS[i%PCOLORS.length])};

  showScreen('s-game');
  const ml={A:'🏆 당첨/꽝 게임',B:'👔 역할 분담',C:'🥇 순위 고르기'};
  document.getElementById('gml').textContent=ml[MODE];
  document.getElementById('gstat').textContent='출발 준비! 🚦';
  document.getElementById('rbtn').style.display='none';

  const canvas=document.getElementById('lc');
  canvas.width=cW;canvas.height=cH;
  const cont=document.getElementById('lcont');
  cont.style.height=(window.innerHeight-112)+'px';
  cont.scrollTop=0;
  _stars=null;
  // Canvas tap/click for swap mode
  const lc=document.getElementById('lc');
  lc.onclick=handleCanvasClick;
  lc.ontouchend=handleCanvasTouch;
  drawFrame();
  setTimeout(()=>{
    if(!G)return;
    try{AC().resume()}catch(e){}  // unlock AudioContext
    G.phase='moving';
    document.getElementById('gstat').textContent='🚀 달리는 중!';
    if(RAF)cancelAnimationFrame(RAF);
    RAF=requestAnimationFrame(loop);
  },1300);
}

function loop(){if(!G)return;tick();drawFrame();if(G.phase==='revealed'&&G.particles.length===0&&G.celebT>200)return;RAF=requestAnimationFrame(loop)}

function getSpd(dim,h){const b=h?4.2:2.5;return Math.max(1.5,b*Math.max(0.5,dim.sc))}

function tick(){
  const g=G;
  if(g.phase==='moving'){
    let allDone=true;
    for(const c of g.characters){
      if(c.done)continue;allDone=false;
      if(c.wpIdx>=c.waypoints.length-1){c.done=true;continue}
      const tgt=c.waypoints[c.wpIdx+1];
      const dx=tgt.x-c.x,dy=tgt.y-c.y,dist=Math.sqrt(dx*dx+dy*dy);
      const spd=getSpd(g.dim,dy===0);
      if(dist<=spd){c.x=tgt.x;c.y=tgt.y;c.wpIdx++}else{c.x+=dx/dist*spd;c.y+=dy/dist*spd}
      c.trail.push({x:c.x,y:c.y});if(c.trail.length>16)c.trail.shift();
      if(dy!==0){_moveTick++;if(_moveTick%18===0)snd_move();}
    }
    if(allDone){
      g.phase='arrived';
      document.getElementById('lcont').scrollTo({top:g.cH,behavior:'smooth'});
      if(g.swapMode){
        setTimeout(()=>{
          if(!G)return;
          G.phase='swapping';
          document.getElementById('gstat').textContent='🔀 바꾸기 찬스! 포스트잇을 눌러 서로 바꿔보세요';
          document.getElementById('swap-ui').style.display='flex';
        },800);
      } else {
        document.getElementById('gstat').textContent='모두 도착! 결과 공개 중... 🎊';
        setTimeout(()=>{if(G){G.phase='revealing';snd_reveal();}},700);
      }
    } else {
      const avgY=g.characters.reduce((s,c)=>s+c.y,0)/g.characters.length;
      const cont=document.getElementById('lcont');
      cont.scrollTop+=(Math.max(0,avgY-cont.clientHeight*.45)-cont.scrollTop)*.09;
    }
  }
  if(g.phase==='revealing'){
    g.revP=Math.min(1,g.revP+.018);
    if(g.revP>.4&&Math.random()<.3)for(const c of g.characters)if((c.slot.cls==='top'||c.slot.cls==='role')&&Math.random()<.5)spawnP(g,CX(c.finalCol,g.n,g.cW,g.dim.cw),RY(NR,g.dim.pt,g.dim.rh)+40,3);
    if(g.revP>=1){g.phase='revealed';document.getElementById('rbtn').style.display='inline-block';document.getElementById('gstat').textContent='🎉 결과 공개 완료!'}
  }
  if(g.phase==='revealed'){g.celebT++;if(g.celebT<160&&Math.random()<.2)for(const c of g.characters)if(c.slot.cls==='top'&&Math.random()<.4)spawnP(g,CX(c.finalCol,g.n,g.cW,g.dim.cw),RY(NR,g.dim.pt,g.dim.rh)+40,2)}
  g.particles=g.particles.filter(p=>p.life>0);
  for(const p of g.particles){p.x+=p.vx;p.y+=p.vy;p.vy+=.16;p.life-=.022;if(p.rot!=null)p.rot+=p.rv}
}

function spawnP(g,x,y,cnt){
  for(let i=0;i<cnt;i++)g.particles.push({x,y,vx:(Math.random()-.5)*7,vy:-Math.random()*5-1.5,color:PCOLORS[Math.floor(Math.random()*PCOLORS.length)],life:1,r:Math.random()*4+2,rot:Math.random()*6.28,rv:(Math.random()-.5)*.3});
}

function drawFrame(){
  if(!G)return;
  const canvas=document.getElementById('lc');
  const ctx=canvas.getContext('2d');
  const{n,bars,characters,slots,cW,cH,dim,revP,phase,particles}=G;
  const{cw,cr,rh,pt,pb,bw,bh}=dim;
  ctx.fillStyle='#07071a';ctx.fillRect(0,0,cW,cH);
  drawBg(ctx,cW,cH);

  for(let col=0;col<n;col++){
    const x=CX(col,n,cW,cw);
    ctx.save();ctx.shadowColor='rgba(96,160,255,.4)';ctx.shadowBlur=9;
    ln(ctx,x,RY(0,pt,rh),x,RY(NR,pt,rh),'rgba(100,160,255,.32)',1.5);ctx.restore();
    ln(ctx,x,RY(0,pt,rh),x,RY(NR,pt,rh),'rgba(255,255,255,.2)',2.5);
  }

  for(let r=0;r<NR;r++){
    const y=RY(r,pt,rh)+rh/2;
    for(let c=0;c<n-1;c++){
      if(!bars[r][c])continue;
      const x1=CX(c,n,cW,cw),x2=CX(c+1,n,cW,cw);
      ctx.save();ctx.shadowColor='rgba(255,210,80,.6)';ctx.shadowBlur=11;
      ln(ctx,x1,y,x2,y,'rgba(255,210,80,.52)',2.5);ctx.restore();
      ln(ctx,x1,y,x2,y,'rgba(255,255,255,.55)',2.5);
    }
  }

  // Swap flash tick
  if(G.swapFlash){G.swapFlash.t--;if(G.swapFlash.t<=0)G.swapFlash=null}

  const showed=phase==='revealing'||phase==='revealed';
  const isSwapping=phase==='swapping';
  for(let col=0;col<n;col++){
    const x=CX(col,n,cW,cw), y=RY(NR,pt,rh)+12;
    const slot=slots[col];
    // All sizes derived from bw (already capped to col width in calcDim)
    const icoSz = Math.max(8, Math.round(bw*0.38));
    const lfs   = Math.max(6, Math.round(bw*0.19));
    const qfs   = Math.max(8, Math.round(bw*0.32));
    const fold  = Math.min(10, Math.round(bw*0.18));
    const rad   = Math.min(6, Math.round(bw*0.10));
    const slide = Math.min(60, bh*0.85);

    if(showed&&revP>0){
      ctx.save();ctx.globalAlpha=revP;
      const isTop=slot.cls==='top';
      if(isTop){ctx.shadowColor='#fbbf24';ctx.shadowBlur=16}
      rr(ctx,x-bw/2,y,bw,bh,rad);
      ctx.fillStyle=isTop?'rgba(251,191,36,.15)':'rgba(255,255,255,.04)';ctx.fill();
      ctx.strokeStyle=slot.color||'rgba(255,255,255,.08)';ctx.lineWidth=isTop?2:1;ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font=`${icoSz}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(slot.ico,x,y+bh*0.33);
      ctx.font=`700 ${lfs}px 'Noto Sans KR',sans-serif`;
      ctx.fillStyle=slot.color||'#9ca3af';
      ctx.fillText(slot.lbl,x,y+bh*0.76);
      ctx.restore();
    }

    if(!showed||(showed&&revP<1)){
      const slideUp=showed?revP*slide:0, alpha=showed?1-revP:1;
      ctx.save();ctx.globalAlpha=alpha;
      ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=7;ctx.shadowOffsetY=3;
      rr(ctx,x-bw/2,y-slideUp,bw,bh,rad);
      ctx.fillStyle=G.pitColors[col];ctx.fill();
      ctx.shadowBlur=0;ctx.shadowOffsetY=0;
      if(fold>=4){
        ctx.beginPath();ctx.moveTo(x+bw/2-fold,y-slideUp);ctx.lineTo(x+bw/2,y-slideUp);ctx.lineTo(x+bw/2,y-slideUp+fold);ctx.closePath();
        ctx.fillStyle='rgba(0,0,0,.2)';ctx.fill();
      }
      ctx.font=`700 ${qfs}px 'Noto Sans KR',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillText('?',x,y-slideUp+bh/2);
      ctx.restore();
    }

    // ── Swap: selected glow ──
    if(isSwapping&&G.swapSel===col){
      ctx.save();
      const pulse=0.5+0.5*Math.sin(Date.now()*0.012);
      ctx.shadowColor='#fff';ctx.shadowBlur=10+pulse*12;
      rr(ctx,x-bw/2-3,y-3,bw+6,bh+6,rad+2);
      ctx.strokeStyle=`rgba(255,255,255,${0.7+pulse*0.3})`;ctx.lineWidth=2.5;ctx.stroke();
      ctx.restore();
    }
    // ── Swap flash ──
    if(G.swapFlash&&(G.swapFlash.a===col||G.swapFlash.b===col)){
      const fp=G.swapFlash.t/22;
      const flashCol=G.swapFlash.a===col?G.swapFlash.cb:G.swapFlash.ca;
      ctx.save();
      // Bright border ring showing new color
      ctx.globalAlpha=fp;
      ctx.shadowColor=flashCol;ctx.shadowBlur=18*fp;
      rr(ctx,x-bw/2-4,y-4,bw+8,bh+8,rad+3);
      ctx.strokeStyle=flashCol;ctx.lineWidth=3;ctx.stroke();
      ctx.shadowBlur=0;
      // White overlay flash
      ctx.globalAlpha=fp*0.5;
      rr(ctx,x-bw/2,y,bw,bh,rad);ctx.fillStyle='#fff';ctx.fill();
      ctx.restore();
    }
  }

  for(const c of characters){
    for(let t=0;t<c.trail.length;t++){
      const tp=c.trail[t],a=(t/c.trail.length)*.28;
      ctx.beginPath();ctx.arc(tp.x,tp.y,Math.max(3,cr*.2),0,Math.PI*2);
      ctx.fillStyle=hr(c.color,a);ctx.fill();
    }
  }

  for(const c of characters)drawChar(ctx,c,cr,dim.sc);

  for(const c of characters){
    const x=CX(c.startCol,n,cW,cw),y=RY(0,pt,rh)-8;
    const nfs=Math.max(8,Math.round(10*dim.sc));
    ctx.font=`700 ${nfs}px 'Noto Sans KR',sans-serif`;ctx.textAlign='center';ctx.textBaseline='bottom';
    const tw=ctx.measureText(c.name).width+8;
    rr(ctx,x-tw/2,y-nfs-2,tw,nfs+4,3);ctx.fillStyle=hr(c.color,.75);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillText(c.name,x,y-1);
  }

  for(const p of particles){
    ctx.save();ctx.globalAlpha=p.life;ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    ctx.fillStyle=p.color;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();
  }
}

function drawChar(ctx,c,cr,sc){
  const{x,y,color,emoji,name}=c;
  ctx.save();ctx.shadowColor=color;ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(x,y,cr+2,0,Math.PI*2);ctx.strokeStyle=hr(color,.35);ctx.lineWidth=3;ctx.stroke();ctx.restore();
  ctx.save();ctx.shadowColor=color;ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(x,y,cr,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  const efs=Math.max(10,Math.round(cr*1.1));
  ctx.font=`${efs}px "Apple Color Emoji","Segoe UI Emoji",serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(emoji,x,y+1);
  const nfs=Math.max(7,Math.round(9*sc));
  ctx.font=`700 ${nfs}px 'Noto Sans KR',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  const ny=y-cr-7,tw=ctx.measureText(name).width+8;
  rr(ctx,x-tw/2,ny-nfs/2-2,tw,nfs+4,4);ctx.fillStyle=hr(color,.85);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillText(name,x,ny);
}

function ln(ctx,x1,y1,x2,y2,col,lw){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke()}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arc(x+w-r,y+r,r,-Math.PI/2,0);ctx.lineTo(x+w,y+h-r);ctx.arc(x+w-r,y+h-r,r,0,Math.PI/2);ctx.lineTo(x+r,y+h);ctx.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);ctx.lineTo(x,y+r);ctx.arc(x+r,y+r,r,Math.PI,-Math.PI/2);ctx.closePath();
}
function hr(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}
function drawBg(ctx,w,h){
  if(!_stars)_stars=Array.from({length:120},()=>({xr:Math.random(),y:Math.random()*4000,r:Math.random()*1.2+.3,a:Math.random()*.5+.15}));
  for(const s of _stars){ctx.beginPath();ctx.arc(s.xr*w,s.y%h,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill()}
}



/* ════════ SOUND ENGINE (Web Audio API) ════════ */
let _AC=null;
function AC(){if(!_AC)_AC=new(window.AudioContext||window.webkitAudioContext)();return _AC}

function snd_move(){
  // 가볍고 경쾌한 틱 소리 (사다리 이동 중 주기적으로)
  try{
    const a=AC(),g=a.createGain();
    g.gain.setValueAtTime(0.08,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.06);
    g.connect(a.destination);
    const o=a.createOscillator();
    o.type='square';
    o.frequency.setValueAtTime(880+Math.random()*200,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(440,a.currentTime+0.06);
    o.connect(g);o.start();o.stop(a.currentTime+0.06);
  }catch(e){}
}

function snd_swap(){
  // 경쾌한 "뿅" 교환음
  try{
    const a=AC();
    [[0,600,300,0.18],[0.05,900,500,0.14],[0.1,1200,700,0.10]].forEach(([t,f1,f2,vol])=>{
      const g=a.createGain();
      g.gain.setValueAtTime(vol,a.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+0.12);
      g.connect(a.destination);
      const o=a.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(f1,a.currentTime+t);
      o.frequency.exponentialRampToValueAtTime(f2,a.currentTime+t+0.12);
      o.connect(g);o.start(a.currentTime+t);o.stop(a.currentTime+t+0.13);
    });
  }catch(e){}
}

function snd_reveal(){
  // 두구두구 → 짠! 포스트잇 공개음
  try{
    const a=AC();
    // 드럼롤 느낌
    [0,0.06,0.11,0.15,0.18,0.20].forEach((t,i)=>{
      const g=a.createGain(),buf=a.createBuffer(1,a.sampleRate*0.05,a.sampleRate);
      const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.pow(1-j/d.length,2);
      const src=a.createBufferSource();src.buffer=buf;
      g.gain.setValueAtTime(0.12+i*0.03,a.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+0.05);
      src.connect(g);g.connect(a.destination);src.start(a.currentTime+t);
    });
    // 짠! 상승 사운드
    [[0.25,300,900,0.25],[0.28,500,1200,0.20],[0.31,700,1600,0.15]].forEach(([t,f1,f2,vol])=>{
      const g=a.createGain();
      g.gain.setValueAtTime(vol,a.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+0.35);
      g.connect(a.destination);
      const o=a.createOscillator();o.type='triangle';
      o.frequency.setValueAtTime(f1,a.currentTime+t);
      o.frequency.exponentialRampToValueAtTime(f2,a.currentTime+t+0.2);
      o.connect(g);o.start(a.currentTime+t);o.stop(a.currentTime+t+0.36);
    });
  }catch(e){}
}

function snd_celebrate(){
  // 팡파레 축하음 (결과 화면)
  try{
    const a=AC();
    const notes=[
      [0,   523, 0.3],[0,   659, 0.2],[0,   784, 0.2],
      [0.18,659, 0.3],[0.18,830, 0.2],[0.18,988, 0.2],
      [0.36,784, 0.3],[0.36,988, 0.2],[0.36,1175,0.2],
      [0.54,1046,0.5],[0.54,1318,0.4],[0.54,1568,0.3],
    ];
    notes.forEach(([t,freq,vol])=>{
      const g=a.createGain();
      g.gain.setValueAtTime(vol*0.4,a.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+0.4);
      g.connect(a.destination);
      const o=a.createOscillator();o.type='triangle';
      o.frequency.value=freq;
      o.connect(g);o.start(a.currentTime+t);o.stop(a.currentTime+t+0.41);
    });
    // 심벌즈 / 노이즈 히트
    [0,0.18,0.36,0.54].forEach(t=>{
      const g=a.createGain(),buf=a.createBuffer(1,a.sampleRate*0.15,a.sampleRate);
      const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.pow(1-j/d.length,1.5);
      const src=a.createBufferSource();src.buffer=buf;
      g.gain.setValueAtTime(0.15,a.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+0.15);
      src.connect(g);g.connect(a.destination);src.start(a.currentTime+t);
    });
  }catch(e){}
}

// 이동 중 틱 소리 타이머
let _moveTick=0;
/* ════════ SWAP FUNCTIONS ════════ */
function handleCanvasClick(e){
  if(!G||G.phase!=='swapping')return;
  const rect=e.target.getBoundingClientRect();
  const sx=e.target.width/rect.width, sy=e.target.height/rect.height;
  doSwap((e.clientX-rect.left)*sx,(e.clientY-rect.top)*sy);
}
function handleCanvasTouch(e){
  if(!G||G.phase!=='swapping')return;
  e.preventDefault();
  const t=e.changedTouches[0];
  const rect=e.target.getBoundingClientRect();
  const sx=e.target.width/rect.width, sy=e.target.height/rect.height;
  doSwap((t.clientX-rect.left)*sx,(t.clientY-rect.top)*sy);
}
function getHitCol(mx,my){
  const{n,cW,dim}=G;const{cw,rh,pt,bw,bh}=dim;
  const boxY=RY(NR,pt,rh)+12;
  if(my<boxY-6||my>boxY+bh+6)return -1;
  for(let col=0;col<n;col++){const x=CX(col,n,cW,cw);if(mx>=x-bw/2-4&&mx<=x+bw/2+4)return col}
  return -1;
}
function doSwap(mx,my){
  const col=getHitCol(mx,my);
  if(col<0){G.swapSel=-1;return}
  if(G.swapSel===-1){G.swapSel=col;return}
  if(G.swapSel===col){G.swapSel=-1;return}
  const a=G.swapSel,b=col;
  const tmp=G.slots[a];G.slots[a]=G.slots[b];G.slots[b]=tmp;
  for(const c of G.characters)c.slot=G.slots[c.finalCol];
  // Swap post-it colors along with slots
  const tmpC=G.pitColors[a];G.pitColors[a]=G.pitColors[b];G.pitColors[b]=tmpC;
  snd_swap();
  G.swapCount++;G.swapSel=-1;
  G.swapFlash={a,b,t:22,ca:G.pitColors[a],cb:G.pitColors[b]};
  const cnt=document.getElementById('swap-cnt');
  cnt.textContent=`총 ${G.swapCount}번 바꿈`;
}
function startReveal(){
  if(!G||G.phase!=='swapping')return;
  G.phase='revealing';
  snd_reveal();
  document.getElementById('swap-ui').style.display='none';
  document.getElementById('gstat').textContent='두구두구... 🎊';
}

function showResult(){
  snd_celebrate();
  const{characters,mode,n}=G;
  const sorted=[...characters].sort((a,b)=>{
    const pri={top:0,rank2:1,rank3:2,role:3,'':4};
    const pa=pri[a.slot.cls]??4,pb=pri[b.slot.cls]??4;
    if(pa!==pb)return pa-pb;
    if(mode==='C'){const na=parseInt(a.slot.lbl),nb=parseInt(b.slot.lbl);if(!isNaN(na)&&!isNaN(nb))return na-nb}
    return 0;
  });

  document.getElementById('rt').textContent=mode==='A'?'🏆 당첨자 발표!':mode==='B'?'👔 역할 배정 결과!':'🏅 순위 결과!';
  const rh=document.getElementById('rh'),rb=document.getElementById('rb');

  if(mode==='A'){
    const winners=characters.filter(c=>c.slot.cls==='top');
    rh.innerHTML=`<div class="hbox"><div class="hboxt">🏆 당첨자 (${winners.length}명)</div><div class="hnms">${winners.map(c=>`<span class="hnm">${c.emoji} ${c.name}</span>`).join('')}</div></div>`;
    rb.innerHTML='<div class="rgrid" id="rg2"></div>';
    const rg=document.getElementById('rg2');
    sorted.forEach((c,i)=>{const d=document.createElement('div');d.className=`rc ${c.slot.cls}`;d.style.animationDelay=`${i*.07}s`;d.innerHTML=`<div class="re">${c.emoji}</div><div class="rn">${c.name}</div><div class="rres">${c.slot.ico} ${c.slot.lbl}</div>`;rg.appendChild(d)});
  } else if(mode==='B'){
    rh.innerHTML='';rb.innerHTML='<div class="rgrid" id="rg2"></div>';
    const rg=document.getElementById('rg2');
    sorted.forEach((c,i)=>{const d=document.createElement('div');d.className='rc role';d.style.animationDelay=`${i*.07}s`;d.innerHTML=`<div class="re">${c.emoji}</div><div class="rn">${c.name}</div><div class="rres">📌 ${c.slot.lbl}</div>`;rg.appendChild(d)});
  } else {
    rh.innerHTML='';
    let h='<div class="rklist">';
    sorted.forEach((c,i)=>{
      const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
      h+=`<div class="rki ${rc}" style="animation-delay:${i*.07}s"><div class="rki-rank">${c.slot.ico}</div><div class="rki-em">${c.emoji}</div><div class="rki-name">${c.name}</div><div style="color:${c.slot.color||'#6b7280'};font-weight:700;font-size:.88rem">${c.slot.lbl}</div></div>`;
    });
    rb.innerHTML=h+'</div>';
  }
  showScreen('s-result');
}

function showScreen(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on')}
function restart(){
  if(RAF){cancelAnimationFrame(RAF);RAF=null}
  const lc=document.getElementById('lc');
  lc.onclick=null;lc.ontouchend=null;
  document.getElementById('swap-ui').style.display='none';
  document.getElementById('rbtn').style.display='none';
  G=null;_stars=null;
  showScreen('s-setup');
}
